<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retail POS Register</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' />
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page-layout">
  <div class="login-card glass-card login-card-padding">
    <h1 class="login-title">Retail POS Register</h1>

    <!-- Registration Form -->
    <section class="login-form-spacing" aria-label="Registration form">
      <form class="space-y-6" novalidate>
        <div>
          <label for="name" class="login-input-label">Full Name</label>
          <input
            id="name"
            type="text"
            required
            class="login-input"
            aria-describedby="name-desc"
          />
          <p id="name-desc" class="sr-only"></p>
        </div>
        <div>
          <label for="email" class="login-input-label">Email</label>
          <input
            id="email"
            type="email"
            required
            placeholder="you@example.com"
            class="login-input"
            aria-describedby="email-desc"
          />
          <p id="email-desc" class="sr-only"></p>
        </div>
        <div>
          <label for="password" class="login-input-label">Password</label>
          <input
            id="password"
            type="password"
            required
            class="login-input"
            aria-describedby="password-desc"
          />
          <p id="password-desc" class="sr-only"></p>
        </div>
        <div>
          <label for="password-confirm" class="login-input-label">Confirm Password</label>
          <input
            id="password-confirm"
            type="password"
            required
            class="login-input"
            aria-describedby="password-confirm-desc"
          />
          <p id="password-confirm-desc" class="sr-only"></p>
        </div>
        <button
          type="submit"
          class="login-submit-btn"
          aria-label="Register"
        >
          <i class="fas fa-user-plus"></i> Register
        </button>
      </form>
    </section>

    <div class="login-register-link">
      <p>Already have an account?<a href="login.html"> Login here</a></p>
    </div>
  </div>


</body>
</html>
