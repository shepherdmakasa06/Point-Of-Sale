<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retail POS Register</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-page-layout">
  <div class="login-card glass-card login-card-padding">
    <div class="mb-4 text-center">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Pro-Tech Logo" class="login-brand-logo mx-auto object-contain">
      <h1 class="login-title">Retail POS</h1>
    </div>

    <!-- Flashed Messages Data -->
    <div id="flash-messages" class="hidden">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div data-category="{{ category }}" data-message="{{ message }}"></div>
      {% endfor %}
      {% endif %}
      {% endwith %}
    </div>

    <!-- Registration Form -->
    <section class="login-form-spacing" aria-label="Registration form">
      <form class="space-y-6" action="{{ url_for('register') }}" method="POST">
        <div>
          <label for="name" class="login-input-label">Full Name</label>
          <input id="name" name="name" type="text" required class="login-input" aria-describedby="name-desc" />
          <p id="name-desc" class="sr-only"></p>
        </div>
        <div>
          <label for="username" class="login-input-label">Username</label>
          <input id="username" name="username" type="text" required class="login-input"
            aria-describedby="username-desc" />
          <p id="username-desc" class="sr-only"></p>
        </div>
        <div>
          <label for="email" class="login-input-label">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" class="login-input"
            aria-describedby="email-desc" />
          <p id="email-desc" class="sr-only"></p>
        </div>
        <div>
          <label for="password" class="login-input-label">Password</label>
          <input id="password" name="password" type="password" required class="login-input"
            aria-describedby="password-desc" />
          <p id="password-desc" class="sr-only"></p>
        </div>
        <div>
          <label for="password-confirm" class="login-input-label">Confirm Password</label>
          <input id="password-confirm" name="password_confirm" type="password" required class="login-input"
            aria-describedby="password-confirm-desc" />
          <p id="password-confirm-desc" class="sr-only"></p>
        </div>
        <button type="submit" class="login-submit-btn" aria-label="Register">
          <i class="fas fa-user-plus"></i> Register
        </button>
      </form>
    </section>

    <div class="login-register-link">
      <p>Already have an account?<a href="{{ url_for('login') }}"> Login here</a></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Toast notification system
      function showToast(message, type = 'info') {
        let toastContainer = document.getElementById('toast-container');
        if (!toastContainer) {
          toastContainer = document.createElement('div');
          toastContainer.id = 'toast-container';
          toastContainer.className = 'w-full flex flex-col gap-2 mb-4';
          const loginCard = document.querySelector('.login-card');
          // Insert after the title
          const title = loginCard.querySelector('.login-title');
          title.parentNode.insertBefore(toastContainer, title.nextSibling);
        }

        const toast = document.createElement('div');
        let bgClass = 'bg-blue-500';
        if (type === 'success') bgClass = 'bg-green-500';
        if (type === 'error') bgClass = 'bg-red-500';
        if (type === 'warning') bgClass = 'bg-yellow-500';

        toast.className = `flex items-center w-full p-4 mb-2 text-white ${bgClass} rounded-lg shadow fade-in`;
        toast.innerHTML = `
          <div class="ml-3 text-sm font-normal">${message}</div>
          <button type="button" class="ml-auto -mx-1.5 -my-1.5 text-white hover:text-gray-200 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 inline-flex h-8 w-8" onclick="this.parentElement.remove()">
            <span>&times;</span>
          </button>
        `;

        toastContainer.appendChild(toast);

        setTimeout(() => {
          if (toast.parentElement) {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s ease';
            setTimeout(() => toast.remove(), 300);
          }
        }, 4000);
      }

      // Check for flash messages
      const flashDataElements = document.querySelectorAll('#flash-messages div');
      flashDataElements.forEach(el => {
        showToast(el.dataset.message, el.dataset.category);
      });
    });
  </script>
</body>

</html>
