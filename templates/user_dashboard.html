<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Retail POS</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' />
  <link rel="stylesheet" href="{{ url_for('static', filename='user_dashboard.css') }}">
</head>
<body class="dashboard-body">
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <div class="dashboard-sidebar">
      <div class="dashboard-sidebar-header">
        <h1 class="dashboard-sidebar-title">Retail POS</h1>
        <p class="dashboard-sidebar-subtitle">User Dashboard</p>
      </div>

      <nav class="dashboard-nav">
        <ul class="dashboard-nav-list">
          <li>
            <button id="sales-btn" class="dashboard-nav-btn active">
              <i class="fas fa-cash-register dashboard-nav-icon"></i>Point of Sale
            </button>
          </li>
          <li>
            <button id="transactions-btn" class="dashboard-nav-btn">
              <i class="fas fa-receipt dashboard-nav-icon"></i>Transactions
            </button>
          </li>
        </ul>
      </nav>

      <div class="dashboard-sidebar-footer">
        <button id="start-session-btn" class="dashboard-session-btn">
          <i class="fas fa-play mr-2"></i>Start Sale Session
        </button>
        <button id="end-session-btn" class="dashboard-end-session-btn hidden">
          <i class="fas fa-stop mr-2"></i>End Sale Session
        </button>
        <div id="session-info" class="mt-2 text-sm text-gray-600 hidden">
          <p>Session Started: <span id="session-time"></span></p>
          <p>Start Amount: $<span id="start-amount">0.00</span></p>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-main">
      <!-- Header -->
      <header class="dashboard-header">
        <div>
          <h2 id="page-title" class="dashboard-header-title">Make Sales</h2>
        </div>
        <div class="dashboard-header-user">
          <button id="header-user" class="dashboard-user-btn">
            <div class="flex items-center space-x-3">
              <div class="dashboard-user-info text-right">
                <p class="dashboard-user-name">Pro Tech</p>
                <p class="dashboard-user-role">User</p>
              </div>
            </div>
          </button>
          <button id="user-logout-btn" class="dashboard-logout-btn" title="Logout">
            <i class="bx bx-log-out text-3xl"></i>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <main class="dashboard-content">
        <!-- Sales Section -->
        <div id="sales-section" class="content-section">
          <div class="pos-layout gap-6">
            <!-- Product Selection -->
            <div class="pos-main">
              <div class="bg-white rounded-lg shadow p-6 pos-panel">
                <h3 class="text-lg font-semibold mb-4">Point of Sale</h3>

                <!-- Search -->
                <div class="mb-4">
                  <input type="text" id="product-search" placeholder="Search products..." class="w-full p-2 border rounded-lg">
                </div>

                <!-- Available Products -->
                <div class="mb-4">
                  <h4 class="font-semibold mb-2">Available Products</h4>
                  <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 pos-scroll">
                    <!-- Products will be dynamically inserted here -->
                  </div>
                </div>

                <p class="text-sm text-gray-600">Click on products to add them to cart</p>
              </div>
            </div>

            <!-- Cart -->
            <div class="pos-cart">
              <div class="bg-white rounded-lg shadow p-6 cart-panel">
                <h3 class="text-lg font-semibold mb-4">Shopping Cart</h3>
                <div id="cart-items" class="space-y-2 mb-4 pos-scroll">
                  <!-- Cart items will be added here -->
                </div>
                <div class="border-t pt-4 space-y-4">
                  <div class="flex justify-between text-lg font-semibold">
                    <span>Total:</span>
                    <span id="cart-total">$0.00</span>
                  </div>

                  <!-- Payment Section -->
                  <div class="space-y-3">
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-1">Amount Tendered</label>
                      <input type="number" id="amount-tendered" placeholder="0.00" min="0" step="0.01" class="w-full p-2 border rounded-lg">
                    </div>
                    <div class="flex justify-between text-sm">
                      <span>Change:</span>
                      <span id="change-amount" class="font-semibold">$0.00</span>
                    </div>
                  </div>
                </div>
                <button id="checkout-btn" class="w-full bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg mt-4 disabled:opacity-50" disabled>
                  <i class="fas fa-credit-card mr-2"></i>Complete Sale
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Transactions Section -->
        <div id="transactions-section" class="content-section hidden">
          <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-semibold mb-4">Recent Transactions</h3>
            <div class="space-y-4" id="transaction-list">
              <!-- Transactions will be inserted here -->
            </div>
          </div>
        </div>

        <!-- Profile Section -->
        <div id="profile-section" class="content-section hidden">
          <div class="max-w-2xl mx-auto">
            <div class="bg-white rounded-lg shadow p-6">
              <h3 class="text-lg font-semibold mb-6">Profile Settings</h3>

              <!-- Edit Details -->
              <div class="mb-8">
                <h4 class="font-semibold mb-4">Edit Details</h4>
                <form class="space-y-4">
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                      <input type="text" id="profile-name" class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                      <input type="text" id="profile-username" class="w-full p-2 border rounded-lg">
                    </div>
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="profile-email" class="w-full p-2 border rounded-lg">
                  </div>
                  <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-lg">
                    <i class="fas fa-save mr-2"></i>Save Changes
                  </button>
                </form>
              </div>

              <!-- Change Password -->
              <div>
                <h4 class="font-semibold mb-4">Change Password</h4>
                <form class="space-y-4">
                  <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                    <input type="password" class="w-full p-2 border rounded-lg">
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" class="w-full p-2 border rounded-lg">
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" class="w-full p-2 border rounded-lg">
                  </div>
                  <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-lg">
                    <i class="fas fa-key mr-2"></i>Change Password
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="{{ url_for('static', filename='user_dashboard.js') }}"></script>
</body>
</html>
